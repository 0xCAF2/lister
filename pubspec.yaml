name: lister
description: "A simple reorderable list tool in Flutter."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 0.5.0+5

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter


  cupertino_icons: ^1.0.6
  hooks_riverpod: ^3.1.0
  flutter_hooks: ^0.21.2
  riverpod_annotation: ^4.0.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0
  riverpod_generator: ^4.0.0+1
  build_runner: ^2.4.9
  custom_lint: ^0.8.1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true

